<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />  <link rel="icon" type="image/x-icon" href="/media/joelus.ico" />  <title>Bingoelus 🎱</title>
  <style>
    /* ── Reset & Variables ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f172a;
      --surface:  #1e293b;
      --surface2: #273549;
      --accent:   #6366f1;
      --accent-h: #818cf8;
      --success:  #22c55e;
      --danger:   #ef4444;
      --warn:     #f59e0b;
      --text:     #e2e8f0;
      --muted:    #94a3b8;
      --radius:   12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      padding: 0;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid #334155;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 24px rgba(0,0,0,.45);
      flex-shrink: 0;
    }
    header h1 {
      font-size: 1.4rem;
      color: var(--accent-h);
      letter-spacing: .06em;
      margin: 0;
      text-align: left;
    }

    #contenido {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 24px 16px;
    }

    .subtitulo {
      color: var(--muted);
      font-size: .9rem;
      margin-bottom: 20px;
      text-align: center;
    }

    /* ── Pantalla de Login ─────────────────────────────── */
    #pantalla-login {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
      max-width: 420px;
    }
    #pantalla-login button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }
    #pantalla-login button:hover  { background: var(--accent-h); }
    #pantalla-login button:active { transform: scale(.97); }

    /* Tarjeta Twitch (mostrada tras autenticarse) */
    #twitch-card {
      width: 100%;
      padding: 16px 20px;
      border-radius: var(--radius);
      background: #1f0a3c;
      border: 1px solid #9147ff66;
      display: none;
      align-items: center;
      gap: 14px;
    }
    #twitch-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #9147ff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    #twitch-card-info { flex: 1; }
    #twitch-card-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
    }
    #twitch-card-login {
      font-size: .85rem;
      color: #9147ff;
      font-weight: 600;
    }
    #twitch-logout {
      font-size: .78rem;
      color: var(--muted);
      text-decoration: underline;
      white-space: nowrap;
    }

    /* Campo Discord */
    #discord-step {
      display: none;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }
    #discord-step label {
      font-size: .88rem;
      color: var(--muted);
    }
    #discord-step input {
      width: 100%;
      padding: 12px 14px;
      border-radius: var(--radius);
      border: 1px solid #334155;
      background: var(--surface);
      color: var(--text);
      font-size: 1rem;
      box-sizing: border-box;
    }
    #discord-step input:focus {
      outline: none;
      border-color: var(--accent);
    }
    #discord-error {
      font-size: .82rem;
      color: var(--danger);
      display: none;
    }

    /* Estado de carga / mensajes de error OAuth */
    #twitch-loading {
      color: var(--muted);
      font-size: .9rem;
      text-align: center;
      padding: 10px;
    }

    #msg-espera {
      color: var(--warn);
      font-size: .9rem;
      text-align: center;
      padding: 12px 20px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid #facc1533;
    }

    /* ── Pantalla de Juego ─────────────────────────────── */
    #pantalla-juego {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 680px;
      gap: 18px;
    }

    /* Cabecera del jugador */
    #cabecera-juego {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 12px 18px;
    }
    #nombre-display { font-size: 1.1rem; font-weight: 700; color: var(--accent-h); }
    #estado-partida {
      font-size: .82rem;
      padding: 4px 12px;
      border-radius: 20px;
      background: var(--surface2);
      color: var(--muted);
    }
    #estado-partida.activa   { background: #14532d; color: var(--success); }
    #estado-partida.finalizada { background: #450a0a; color: var(--danger); }

    /* Cartón 5×5 */
    #carton {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      width: 100%;
    }
    .celda-jugador {
      background: var(--surface);
      border: 2px solid #1e293b;
      border-radius: 8px;
      padding: 8px 4px;
      min-height: 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: .9rem;
      line-height: 1.3;
      word-break: break-word;
      transition: all .3s ease;
      user-select: none;
      gap: 4px;
    }
    .celda-jugador .celda-img {
      width: 56px;
      height: 56px;
      object-fit: contain;
      flex-shrink: 0;
    }
    /* Estado: no cantada — legible pero apagada */
    .celda-jugador.no-cantada {
      color: #94a3b8;
      cursor: default;
    }
    /* Estado: cantada pero no marcada — misma apariencia que no-cantada (clickable) */
    .celda-jugador.cantada:not(.marcada) {
      color: #94a3b8;
      cursor: pointer;
    }
    /* Estado: marcada por el jugador — tachada con énfasis */
    .celda-jugador.marcada {
      background: linear-gradient(135deg, #14532d, #166534);
      border-color: var(--success);
      color: #86efac;
      font-weight: 700;
      text-decoration: line-through;
      text-decoration-color: #86efac99;
      box-shadow: 0 0 12px rgba(34,197,94,.4);
      cursor: pointer;
    }
    #acciones button.eligible {
      animation: pulso-boton 1.4s ease-in-out infinite alternate;
    }
    @keyframes pulso-boton {
      from { box-shadow: 0 0 6px 2px rgba(255,255,255,.2); }
      to   { box-shadow: 0 0 22px 6px rgba(255,255,255,.5); }
    }
    @keyframes aparecer {
      from { transform: scale(.9); opacity: .4; }
      to   { transform: scale(1); opacity: 1; }
    }

    /* Botones de acción */
    #acciones {
      display: flex;
      gap: 12px;
      width: 100%;
    }
    #acciones button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: var(--radius);
      font-size: 1.15rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
    }
    #btn-linea {
      background: var(--warn);
      color: #000;
    }
    #btn-linea:hover  { background: #fcd34d; }
    #btn-bingo {
      background: var(--success);
      color: #000;
    }
    #btn-bingo:hover  { background: #4ade80; }

    /* ── Notificaciones en pantalla ────────────────────── */
    #notificacion {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px 24px;
      font-size: .95rem;
      font-weight: 600;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
      transition: transform .4s cubic-bezier(.34,1.56,.64,1);
      z-index: 999;
      text-align: center;
      max-width: 90vw;
      border: 2px solid transparent;
    }
    #notificacion.visible  { transform: translateX(-50%) translateY(0); }
    #notificacion.ok       { border-color: var(--success); color: var(--success); }
    #notificacion.error    { border-color: var(--danger);  color: var(--danger); }
    #notificacion.info     { border-color: var(--accent);  color: var(--accent-h); }

    /* ── Banner de anuncio (para línea/bingo de otro jugador) ── */
    #banner-anuncio {
      display: none;
      width: 100%;
      padding: 10px 18px;
      border-radius: var(--radius);
      text-align: center;
      font-weight: 700;
      font-size: .92rem;
    }
    #banner-anuncio.linea { background: #451a0333; border: 1px solid var(--warn);    color: var(--warn); }
    #banner-anuncio.bingo { background: #052e1633; border: 1px solid var(--success); color: var(--success); }

    /* ── Scrollbar ─────────────────────────────────────── */
    ::-webkit-scrollbar       { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
    /* ── Modal de premio al jugador ─────────────────────── */
    #modal-premio {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.85);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      padding: 24px;
      text-align: center;
    }
    #modal-premio.visible { display: flex; }
    #modal-premio img {
      max-width: min(280px, 80vw);
      border-radius: 16px;
      box-shadow: 0 0 40px rgba(255,255,255,.15);
      animation: aparecer .4s ease;
    }
    #modal-premio p {
      font-size: 1.5rem;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 20px currentColor;
      max-width: 380px;
    }
    #modal-premio p.linea-msg { color: var(--warn); }
    #modal-premio p.bingo-msg { color: var(--success); }
    #modal-premio button {
      padding: 12px 36px;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
    }
    #modal-premio button:hover { background: var(--accent-h); }  </style>
</head>
<body>

<header>
  <h1>🎱 Bingoelus</h1>
</header>

<div id="contenido">

<!-- ════════ MODAL PREMIO JUGADOR ════════ -->
<div id="modal-premio">
  <img id="modal-premio-img" src="" alt="Premio" />
  <p id="modal-premio-msg"></p>
  <button id="modal-premio-btn">Continuar ▶</button>
</div>

<!-- ════════ NOTIFICACIÓN FLOTANTE ════════ -->
<div id="notificacion"></div>

<!-- ════════ PANTALLA DE LOGIN ════════ -->
<div id="pantalla-login">

  <!-- Estado: verificando sesión / errores OAuth -->
  <div id="twitch-loading">🟣 Verificando sesión de Twitch...</div>

  <!-- Tarjeta Twitch (visible al confirmarse la sesión) -->
  <div id="twitch-card">
    <div id="twitch-avatar"></div>
    <div id="twitch-card-info">
      <div id="twitch-card-name"></div>
      <div id="twitch-card-login"></div>
    </div>
    <a id="twitch-logout" href="/auth/twitch/logout">Cambiar cuenta</a>
  </div>

  <!-- Paso Discord (visible tras confirmar sesión Twitch) -->
  <div id="discord-step">
    <label for="input-discord">👾 ¿Cuál es tu nombre en el servidor de Discord?</label>
    <input id="input-discord" type="text" placeholder="Tu nombre en Discord" maxlength="32" autocomplete="off" />
    <span id="discord-error">Debes introducir tu nombre de Discord para poder jugar.</span>
  </div>

  <button id="btn-entrar" style="display:none">▶ Entrar al juego</button>
  <div id="msg-espera" style="display:none">
    ⏳ Esperando que el gestor inicie una partida...
  </div>
</div>

<!-- ════════ PANTALLA DE JUEGO ════════ -->
<div id="pantalla-juego">

  <div id="cabecera-juego">
    <span id="nombre-display"></span>
    <span id="estado-partida">Conectado</span>
  </div>

  <div id="banner-anuncio"></div>

  <div id="carton"></div>

  <div id="acciones">
    <button id="btn-linea">🎉 ¡Línea!</button>
    <button id="btn-bingo">🏆 ¡Bingo!</button>
  </div>

</div><!-- fin #contenido -->

<!-- Socket.io -->
<script src="/socket.io/socket.io.js"></script>
<script src="/cliente.js"></script>
</body>
</html>
